# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "Erik S. | System Admin & Home Lab Portfolio"
lang: en
author: "Erik S."
email: erik.sleziona@gmail.com
description: >-
  Technical documentation of my home lab, networking projects, 
  and automated systems administration.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username: eriksleziona
linkedin_username: erik-sleziona-867655197 # Most themes support this!

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag # Important for appearing in Google searches

# --- Project Specific Settings ---
# You can add custom variables here to use in your pages
lab_status: "Active"
main_hypervisor: "Proxmox VE / VirtualBox / HomeAssistant / NAS Server / Raspberry Pi for Ebus Monitoring and other projects"
profile_headline: "Aspiring system administrator focused on Linux, Python, and practical systems administration."
profile_short: "I am building this site as a working portfolio for my path toward system administration, documenting the lab work, troubleshooting, and day-to-day habits that help me grow."
profile_story: >-
  I learn best by building real environments and solving real problems. Through
  this home lab, I am developing hands-on experience in Linux administration,
  Python-based automation, and the kind of structured troubleshooting that good
  system administration depends on.
profile_focus:
  - "Linux administration and shell-based workflows"
  - "Python for automation and practical admin tasks"
  - "Systems administration in hands-on lab environments"
  - "Troubleshooting, documentation, and repeatable operational habits"
profile_goals:
  - "Keep growing toward a system administrator role with stronger real-world Linux and infrastructure experience."
  - "Use Python to automate repetitive tasks and make environments easier to maintain."
  - "Build a portfolio that shows practical system administration work, not just theory."

